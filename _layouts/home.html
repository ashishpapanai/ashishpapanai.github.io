---
---
{% assign base_path = site.url | append: site.baseurl %}
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 | default: 'en' }}">
<head>
  <script>(function(){try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.name }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html }}">
  <meta name="author" content="{{ site.name }}">
  <meta name="keywords" content="Machine Learning, Computer Vision, Multimodal, Spatial Audio, Deep Learning, Ashish Papanai, University of Tübingen">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default: site.name }}">
  <meta property="og:description" content="{{ site.description | strip_html }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:image" content="{{ site.url }}/images/{{ site.author.avatar }}">
  <meta name="twitter:card" content="summary">

  <link rel="icon" href="{{ base_path }}/images/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg">
  <link rel="apple-touch-icon" href="{{ base_path }}/images/apple-touch-icon-180x180.png">
  <link rel="stylesheet" href="{{ base_path }}/assets/css/minimal.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Ashish Papanai",
    "jobTitle": "MSc Machine Learning Student",
    "worksFor": { "@type": "Organization", "name": "University of Tübingen" },
    "alumniOf": { "@type": "Organization", "name": "Guru Gobind Singh Indraprastha University" },
    "url": "{{ site.url }}",
    "sameAs": [
      "https://www.linkedin.com/in/ashishpapanai/",
      "https://github.com/ashishpapanai/",
      "https://scholar.google.com/citations?user=MpzridIAAAAJ&hl=en",
      "https://x.com/ashishpapanai1"
    ]
  }
  </script>
</head>
<body>

  {% include nav.html %}

  <main class="wrap" id="top">
    {{ content }}
  </main>

  <footer class="site">
    <div class="wrap">
      <p class="footer-line">
        <span>&copy; {{ site.time | date: '%Y' }} {{ site.name }} &middot; Built with
          <a href="https://jekyllrb.com/">Jekyll</a>, hosted on GitHub Pages.</span>
        <!-- Visit tracker (no account needed; badge is generated per-URL). -->
        <a class="counter" href="https://hits.sh/ashishpapanai.github.io/" title="Total visits">
          <img alt="Visits"
               src="https://hits.sh/ashishpapanai.github.io.svg?style=flat-square&label=visitors&color=6b7280&labelColor=f3f4f6">
        </a>
      </p>
      <p class="footer-updated">Last updated {{ site.time | date: '%B %-d, %Y' }}</p>
    </div>
  </footer>

</body>
</html>
