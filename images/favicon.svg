<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="round"><rect width="512" height="512" rx="116"/></clipPath>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="#0a0e1a"/>
    <!-- Overlapping anisotropic Gaussians (a 2D "splat" cluster) -->
    <g filter="url(#soft)">
      <ellipse cx="160" cy="165" rx="165" ry="120" fill="#3b82f6" transform="rotate(-25 160 165)" style="mix-blend-mode:screen"/>
      <ellipse cx="360" cy="150" rx="150" ry="112" fill="#22d3ee" transform="rotate(20 360 150)" style="mix-blend-mode:screen"/>
      <ellipse cx="368" cy="360" rx="168" ry="120" fill="#8b5cf6" transform="rotate(-15 368 360)" style="mix-blend-mode:screen"/>
      <ellipse cx="150" cy="368" rx="150" ry="112" fill="#ec4899" transform="rotate(30 150 368)" style="mix-blend-mode:screen"/>
      <ellipse cx="256" cy="256" rx="132" ry="132" fill="#c7d2fe" style="mix-blend-mode:screen"/>
    </g>
  </g>
</svg>
